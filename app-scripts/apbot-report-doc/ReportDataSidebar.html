<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Optional: Add custom base styles or component styles if needed */
      button {
        cursor: pointer;
      }
      /* Simple SVG icon styling */
      .copy-icon,
      .nav-icon,
      .refresh-icon {
        width: 1em;
        height: 1em;
        display: inline-block;
        vertical-align: middle;
      }
      .toggle-width-icon .expand {
        display: none;
      }
      /* Ensure disabled buttons have the right cursor */
      button:disabled {
        cursor: not-allowed;
      }
      /* Add a little space below the header/refresh area */
      #header-controls {
        margin-bottom: 1rem; /* Tailwind class mb-4 */
      }
    </style>
  </head>
  <body class="bg-gray-100 text-sm font-sans">
    <div
      id="header-controls"
      class="bg-white px-2 flex justify-end items-center pb-2 border-b border-gray-300 mb-4"
    >
      <!-- <button id="toggle-width-button" title="Toggle Sidebar Width" class="p-1.5 rounded text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition-colors duration-150 mr-2 icon-btn">
        <svg class="toggle-width-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
           <path class="expand" stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9m5.25 11.25v-4.5m0 4.5h-4.5m4.5 0L15 15" />
           <path class="collapse" stroke-linecap="round" stroke-linejoin="round" d="M9 9V3.75M9 9h-5.25M9 9L3.75 3.75M9 15v6.25M9 15H3.75M9 15l-5.25 6.25M15 9V3.75M15 9h5.25M15 9l5.25-3.75M15 15v6.25M15 15h5.25M15 15l5.25 6.25" />
             </svg>
       </button> -->
      <button
        id="refresh-button"
        title="Refresh Data"
        class="p-1.5 rounded text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition-colors duration-150 disabled:opacity-50"
      >
        <svg
          class="refresh-icon h-5 w-5"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"
          />
        </svg>
      </button>
    </div>

    <div id="loading" class="text-center mt-5 italic text-gray-500">
      Loading report data...
    </div>
    <div
      id="error"
      class="text-center mt-5 italic text-red-600 font-bold"
      style="display: none"
    ></div>
    <div id="data-container" class="space-y-5 bg-gray-100 px-1"></div>

    <script>
      // Store the full dataset globally within the sidebar's scope
      let fullReportData = null;
      // Store current index for each paginated section
      let sectionCurrentIndices = {};

      // --- Initialization ---
      window.addEventListener('load', () => {
        // Add event listener for the refresh button
        const refreshButton = document.getElementById('refresh-button');
        
        if (refreshButton) {
          refreshButton.addEventListener('click', handleRefresh);
        }
      
        // Initial data load
        loadData();
      });

      function handleRefresh() {
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const container = document.getElementById('data-container');
        const refreshButton = document.getElementById('refresh-button');

        // Show loading, hide error/data, disable button
        loadingDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        container.innerHTML = ''; // Clear old data
        if (refreshButton) refreshButton.disabled = true;

        // Call loadData again
        loadData();
      }
    
      function loadData() {
        const refreshButton = document.getElementById('refresh-button');
        // Ensure refresh button is disabled during load
        if (refreshButton) refreshButton.disabled = true;

        google.script.run
          .withSuccessHandler(initializeDisplay)
          .withFailureHandler(showError) // showError will re-enable the button
          .getReportData(); // Call the Apps Script function
      }

      /**
       * Initial setup after fetching data. Parses data and calls display function.
       * @param {string} jsonDataString The JSON string fetched from PropertiesService.
       */
      function initializeDisplay(jsonDataString) {
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const refreshButton = document.getElementById('refresh-button');
        errorDiv.style.display = 'none'; // Hide error message

        if (!jsonDataString) {
          showError(
            "No data found. Please run 'Export Report Data' in the Google Sheet first."
          );
          // Keep button disabled if no data found initially
          return;
        }

        try {
          fullReportData = JSON.parse(jsonDataString);
console.log(jsonDataString)
console.log(fullReportData)
          // Check for server-side error message within the data
          if (fullReportData && fullReportData.error) {
            showError(fullReportData.error);
            // Keep button disabled on error
            return;
          }

          displayAllSections(); // Render the initial view
          loadingDiv.style.display = 'none'; // Hide loading message
          if (refreshButton) refreshButton.disabled = false; // Re-enable button on success
        } catch (e) {
          showError(
            `Error parsing data: ${e.message}. Make sure data was exported correctly.`
          );
          console.error('Parsing error:', e);
          console.error('Received data string:', jsonDataString);
          fullReportData = null; // Reset data on error
          // Keep button disabled on error
        }
      }

      /**
       * Renders all sections based on the globally stored fullReportData,
       * applying custom layouts for specific sections.
       */
      function displayAllSections() {
        const container = document.getElementById('data-container');
        container.innerHTML = ''; // Clear previous data
        sectionCurrentIndices = {}; // Reset indices

        if (!fullReportData) {
          showError('Data is not available.');
          return;
        }

        // Define sections to exclude from default pagination/rendering
        const handledSections = [
          'ReportInputsRange',
          'FemaDataRange',
          'NeighborhoodBoundariesRange',
          'TaxEntitiesRange',
          'ClientDataRange'
        ];

        // Iterate through each named range (key in the main object)
        for (const rangeName in fullReportData) {
          if (fullReportData.hasOwnProperty(rangeName)) {
            const dataArray = fullReportData[rangeName]; // This is an array of objects

            if (dataArray && dataArray.length > 0) {
              const sectionDiv = document.createElement('div');
              sectionDiv.className = 'bg-white border border-gray-100 p-2 rounded-md';
              sectionDiv.id = `section-container-${rangeName}`;
              
              const title = document.createElement('h5');
              title.textContent = rangeName
                .replace(/Range$/, '')
                .replace(/([A-Z])/g, ' $1')
                .trim();
              title.className =
                'border-b border-gray-300 pb-1 mb-2 text-base font-extrabold text-black';
              sectionDiv.appendChild(title);

              const listContainer = document.createElement('div');
              listContainer.className = 'space-y-1'; // Default spacing
              listContainer.id = `section-data-${rangeName}`; // ID for potential updates

              // --- Custom Layouts ---
              if (rangeName === 'ReportInputsRange' || rangeName === 'ClientDataRange') {
                // Show all items as standard key-value pairs
                dataArray.forEach((item) => {
                  const label =
                    item.label || item.variableName || 'Unknown Label';
                  const value =
                    item.value !== undefined && item.value !== null
                      ? String(item.value)
                      : '';
                  listContainer.appendChild(createDataItem(label, value));
                });
              } else if (rangeName === 'FemaDataRange') {
                // Custom 2-column layout for Fema data
                listContainer.className = 'space-y-2'; // Adjust spacing if needed
                dataArray.forEach((item) => {
                  listContainer.appendChild(createFemaDataItem(item));
                });
              } else if (rangeName === 'NeighborhoodBoundariesRange') {
                // Simple vertical list for Neighborhood Boundaries from array
                listContainer.className = 'space-y-1.5'; // Vertical spacing
                // Iterate through the array of boundary objects
                dataArray.forEach((item) => {
                  const dir = item.Side || 'Unknown Side'; // Get the direction/side
                  // IMPORTANT: Access "Street Name" using bracket notation because of the space
                  const value =
                    item['Street Name'] !== undefined &&
                    item['Street Name'] !== null
                      ? String(item['Street Name'])
                      : '';

                  // Create a container for each direction
                  const dirDiv = document.createElement('div');
                  dirDiv.className =
                    'flex justify-between items-center pb-1 border-b border-gray-200 last:border-b-0'; // Similar styling to createDataItem

                  // Label (Direction Name)
                  const labelSpan = document.createElement('span');
                  labelSpan.className = 'font-medium text-gray-800 mr-2';
                  labelSpan.textContent = dir;

                  // Value and Copy Button Container (aligned right)
                  const valueContainer = document.createElement('div');
                  valueContainer.className =
                    'flex items-center text-right grow justify-end';

                  const valueSpan = document.createElement('span');
                  valueSpan.className = 'text-gray-600 mr-1 break-all';
                  valueSpan.textContent = value;
                  valueContainer.appendChild(valueSpan);

                  if (value && value.trim() !== '') {
                    const copyButton = createCopyButton(value);
                    valueContainer.appendChild(copyButton);
                  }

                  dirDiv.appendChild(labelSpan);
                  dirDiv.appendChild(valueContainer);
                  listContainer.appendChild(dirDiv);
                });
              } else if (rangeName === 'TaxEntitiesRange') {
                // Vertical list for Tax Entities, Combined Rate last
                let combinedRateItem = null;
                dataArray.forEach((item) => {
                  const entity = item.Entity || 'Unknown Entity';
                  const rate =
                    item.Rate !== undefined && item.Rate !== null
                      ? String(item.Rate)
                      : '';
                  if (entity === 'Combined Rate') {
                    combinedRateItem = createDataItem(entity, rate); // Save for later
                  } else {
                    listContainer.appendChild(createDataItem(entity, rate));
                  }
                });
                if (combinedRateItem) {
                  // Add a small separator before the combined rate
                  const separator = document.createElement('hr');
                  separator.className = 'my-1 border-gray-200';
                  listContainer.appendChild(separator);
                  listContainer.appendChild(combinedRateItem); // Append last
                }
              }
              // --- Default Handling (Paginated) ---
              else {
                sectionCurrentIndices[rangeName] = 0; // Initialize index for this section
                renderPaginatedRow(listContainer, rangeName, 0); // Render the first row

                // Add pagination controls only if there's more than one row
                if (dataArray.length > 1) {
                  // Append pagination controls *after* the list container within the sectionDiv
                  sectionDiv.appendChild(listContainer); // Add list container first
                  sectionDiv.appendChild(
                    createPaginationControls(rangeName, dataArray.length)
                  );
                  container.appendChild(sectionDiv); // Add the whole section
                  continue; // Skip the default append logic below for paginated sections
                }
              }

              // Append list container and section div for non-paginated sections
              sectionDiv.appendChild(listContainer);
              container.appendChild(sectionDiv);
            }
          }
        }
      }

      /**
       * Renders the data items for a specific row within a paginated section.
       * @param {HTMLElement} container The div element where data items should be placed.
       * @param {string} rangeName The key for the data array in fullReportData.
       * @param {number} rowIndex The index of the row to render.
       */
      function renderPaginatedRow(container, rangeName, rowIndex) {
        container.innerHTML = ''; // Clear previous row's items
        const dataArray = fullReportData[rangeName];
        if (!dataArray || rowIndex < 0 || rowIndex >= dataArray.length) {
          container.textContent = 'Invalid row index.';
          return;
        }

        const item = dataArray[rowIndex];
        for (const key in item) {
          if (item.hasOwnProperty(key)) {
            const label = key;
            const value =
              item[key] !== undefined && item[key] !== null
                ? String(item[key])
                : '';
            container.appendChild(createDataItem(label, value));
          }
        }
      }

      /**
       * Creates the pagination controls (Previous button, indicator, Next button).
       * @param {string} rangeName The identifier for the data section.
       * @param {number} totalRows The total number of rows for this section.
       * @return {HTMLElement} The div containing the pagination controls.
       */
      function createPaginationControls(rangeName, totalRows) {
        const paginationDiv = document.createElement('div');
        paginationDiv.className =
          'flex justify-between items-center mt-2 pt-1 border-t border-gray-200';
        paginationDiv.id = `pagination-${rangeName}`;

        // Previous Button
        const prevButton = document.createElement('button');
        prevButton.className =
          'px-2 py-1 text-xs rounded border border-gray-400 bg-gray-50 hover:bg-gray-200 text-gray-600 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed';
        prevButton.innerHTML = `<svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg> Prev`;
        prevButton.onclick = () => navigatePaginatedSection(rangeName, -1);
        prevButton.id = `prev-${rangeName}`;

        // Indicator
        const indicatorSpan = document.createElement('span');
        indicatorSpan.className = 'text-xs text-gray-500';
        indicatorSpan.id = `indicator-${rangeName}`;
        indicatorSpan.textContent = `Row ${
          sectionCurrentIndices[rangeName] + 1
        } of ${totalRows}`;

        // Next Button
        const nextButton = document.createElement('button');
        nextButton.className =
          'px-2 py-1 text-xs rounded border border-gray-400 bg-gray-50 hover:bg-gray-200 text-gray-600 transition-colors duration-150 disabled:opacity-50 disabled:cursor-not-allowed';
        nextButton.innerHTML = `Next <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>`;
        nextButton.onclick = () => navigatePaginatedSection(rangeName, 1);
        nextButton.id = `next-${rangeName}`;

        paginationDiv.appendChild(prevButton);
        paginationDiv.appendChild(indicatorSpan);
        paginationDiv.appendChild(nextButton);

        // Initial button state
        updatePaginationButtonStates(
          rangeName,
          sectionCurrentIndices[rangeName],
          totalRows
        );

        return paginationDiv;
      }

      /**
       * Handles navigation clicks for paginated sections.
       * @param {string} rangeName The identifier for the data section.
       * @param {number} direction -1 for previous, 1 for next.
       */
      function navigatePaginatedSection(rangeName, direction) {
        const dataArray = fullReportData[rangeName];
        const totalRows = dataArray.length;
        let currentIndex = sectionCurrentIndices[rangeName];

        const newIndex = currentIndex + direction;

        // Check bounds
        if (newIndex >= 0 && newIndex < totalRows) {
          sectionCurrentIndices[rangeName] = newIndex; // Update the stored index
          const listContainer = document.getElementById(
            `section-data-${rangeName}`
          );
          renderPaginatedRow(listContainer, rangeName, newIndex); // Re-render the row data
          updatePaginationButtonStates(rangeName, newIndex, totalRows); // Update button states
          updatePaginationIndicator(rangeName, newIndex, totalRows); // Update indicator text
        }
      }

      /** Updates the enabled/disabled state of pagination buttons. */
      function updatePaginationButtonStates(
        rangeName,
        currentIndex,
        totalRows
      ) {
        const prevButton = document.getElementById(`prev-${rangeName}`);
        const nextButton = document.getElementById(`next-${rangeName}`);
        if (prevButton) prevButton.disabled = currentIndex <= 0;
        if (nextButton) nextButton.disabled = currentIndex >= totalRows - 1;
      }

      /** Updates the text of the pagination indicator. */
      function updatePaginationIndicator(rangeName, currentIndex, totalRows) {
        const indicator = document.getElementById(`indicator-${rangeName}`);
        if (indicator) {
          indicator.textContent = `Row ${currentIndex + 1} of ${totalRows}`;
        }
      }

      /**
       * Creates a standard single data item row (label, value, copy button).
       * @param {string} labelText The text for the data label.
       * @param {string} valueText The value to display and copy.
       * @return {HTMLElement} The div element representing the data item.
       */
      function createDataItem(labelText, valueText) {
        const itemDiv = document.createElement('div');
        itemDiv.className =
          'flex justify-between items-center py-1 border-b border-gray-200 last:border-b-0';

        const labelSpan = document.createElement('span');
        labelSpan.className =
          'font-medium mr-2 text-gray-800 break-words shrink';
        labelSpan.textContent = labelText;

        const valueSpan = document.createElement('span');
        valueSpan.className = 'text-right text-gray-600 mr-1 break-all grow';
        valueSpan.textContent = valueText;

        // Only add copy button if value is not empty
        if (valueText && valueText.trim() !== '') {
          const copyButton = createCopyButton(valueText);
          itemDiv.appendChild(labelSpan);
          itemDiv.appendChild(valueSpan);
          itemDiv.appendChild(copyButton);
        } else {
          // If no value, just show label and empty value area
          itemDiv.appendChild(labelSpan);
          itemDiv.appendChild(valueSpan); // valueSpan will be empty
          // Optionally add a placeholder or adjust styling for empty values
        }

        return itemDiv;
      }

      /**
       * Creates a specific data item row for FemaData.
       * | Label        | Value |
       * | variableName | [Copy]|
       * @param {object} item The data object for one Fema row.
       * @return {HTMLElement} The div element representing the Fema data item.
       */
      function createFemaDataItem(item) {
        const itemDiv = document.createElement('div');
        // Flex container for the whole item, with bottom border
        itemDiv.className =
          'flex justify-between items-start py-1.5 border-b border-gray-200 last:border-b-0';

        // Left column (Label and Variable Name)
        const leftDiv = document.createElement('div');
        leftDiv.className = 'flex flex-col mr-2 shrink'; // Allow shrinking

        const labelSpan = document.createElement('span');
        labelSpan.className = 'font-medium text-gray-800 break-words';
        labelSpan.textContent = item.label || 'Unknown Label'; // Use label from data

        const varNameSpan = document.createElement('span');
        varNameSpan.className = 'text-xs text-gray-500 break-words';
        varNameSpan.textContent = item.variableName || ''; // Use variableName from data

        leftDiv.appendChild(labelSpan);
        leftDiv.appendChild(varNameSpan);

        // Right column (Value and Copy Button)
        const rightDiv = document.createElement('div');
        rightDiv.className = 'flex items-center text-right grow justify-end'; // Grow, align right

        const valueText =
          item.value !== undefined && item.value !== null
            ? String(item.value)
            : '';
        const valueSpan = document.createElement('span');
        valueSpan.className = 'text-gray-600 mr-1 break-all';
        valueSpan.textContent = valueText;

        rightDiv.appendChild(valueSpan);

        // Only add copy button if value is not empty
        if (valueText && valueText.trim() !== '') {
          const copyButton = createCopyButton(valueText);
          rightDiv.appendChild(copyButton);
        }

        itemDiv.appendChild(leftDiv);
        itemDiv.appendChild(rightDiv);

        return itemDiv;
      }

      /**
       * Creates a copy button element.
       * @param {string} valueToCopy The text value this button should copy.
       * @returns {HTMLButtonElement} The configured button element.
       */
      function createCopyButton(valueToCopy) {
        const copyButton = document.createElement('button');
        copyButton.className =
          'copy-btn px-1.5 py-0.5 text-xs leading-tight ml-1 shrink-0 rounded border border-gray-400 bg-gray-50 hover:bg-gray-200 text-gray-600 transition-colors duration-150';
        copyButton.innerHTML = `
            <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
            </svg>`;
        copyButton.title = 'Copy value';
        copyButton.type = 'button';
        copyButton.addEventListener('click', function () {
          copyToClipboard(valueToCopy, copyButton);
        });
        return copyButton;
      }

      /**
       * Copies the provided text to the clipboard and gives visual feedback using Tailwind classes.
       * @param {string} text The text to copy.
       * @param {HTMLElement} button The button element that was clicked.
       */
      function copyToClipboard(text, button) {
        navigator.clipboard
          .writeText(text)
          .then(function () {
            // Success feedback
            const originalClasses = button.className;
            const originalHtml = button.innerHTML;
            button.innerHTML = `<svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
            button.className = originalClasses.replace(
              'border-gray-400 bg-gray-50 hover:bg-gray-200 text-gray-600',
              'border-green-500 bg-green-100 text-green-700'
            );
            setTimeout(() => {
              button.innerHTML = originalHtml;
              button.className = originalClasses;
            }, 1500);
          })
          .catch(function (err) {
            // Error feedback
            console.error('Failed to copy: ', err);
            const originalClasses = button.className;
            const originalHtml = button.innerHTML;
            button.innerHTML = `<svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;
            button.className = originalClasses.replace(
              'border-gray-400 bg-gray-50 hover:bg-gray-200 text-gray-600',
              'border-red-500 bg-red-100 text-red-700'
            );
            setTimeout(() => {
              button.innerHTML = originalHtml;
              button.className = originalClasses;
            }, 2000);
          });
      }

      /**
       * Displays an error message in the sidebar. Also re-enables refresh button.
       * @param {string|Error} error The error message or Error object.
       */
      function showError(error) {
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const container = document.getElementById('data-container');
        const refreshButton = document.getElementById('refresh-button');

        loadingDiv.style.display = 'none';
        container.innerHTML = ''; // Clear any partial data
        errorDiv.textContent =
          error instanceof Error ? error.message : String(error);
        errorDiv.style.display = 'block';
        if (refreshButton) refreshButton.disabled = false; // Re-enable button on error
        console.error('Sidebar Error:', error);
      }
    </script>
  </body>
</html>
