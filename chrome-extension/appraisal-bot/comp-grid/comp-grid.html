<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appraisal Comparable Grid - TOTAL Style</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        background-color: #e5e7eb;
        color: #111827;
        padding: 1rem;
      }
      .page-shell {
        max-width: 1400px;
        margin-left: auto;
        margin-right: auto;
        background: #fff;
        padding: 1.5rem;
        border-radius: 0.5rem;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #1f2937;
      }
      .page-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: -0.025em;
      }
      .subject-line {
        margin: 0.25rem 0 0;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .header-right {
        text-align: right;
      }
      .badge-uad {
        display: inline-block;
        background: #000;
        color: #fff;
        padding: 0.25rem 0.5rem;
        font-size: 10px;
        font-weight: 700;
        border-radius: 0.25rem;
      }
      .grid-header {
        background-color: #e5e7eb;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.65rem;
        color: #374151;
        border: 1px solid #9ca3af;
      }
      .field-label-col {
        background-color: #f3f4f6;
        font-weight: 700;
        font-size: 0.7rem;
        color: #1f2937;
        width: 160px;
        min-width: 160px;
        border-right: 2px solid #9ca3af;
      }
      .subject-cell {
        background-color: #eff6ff;
        border-right: 2px solid #3b82f6;
      }
      tbody td.subject-cell {
        font-weight: 700;
      }
      .data-cell {
        padding: 4px 8px;
        border: 1px solid #d1d5db;
        font-size: 0.8rem;
        height: 32px;
        vertical-align: middle;
      }
      .text-center {
        text-align: center;
      }
      .sticky-left {
        position: sticky;
        left: 0;
        z-index: 20;
      }
      .table-container {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .table-scroll {
        overflow-x: auto;
        border: 2px solid #9ca3af;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }
      .hidden {
        display: none !important;
      }
      #grid-empty-state {
        padding: 1rem 1.25rem;
        background: #fef3c7;
        border: 1px solid #d97706;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        color: #78350f;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <div>
          <h1 id="comp-grid-page-title" class="page-title">
            Sales Comparison Analysis
          </h1>
          <p id="comp-grid-subject-line" class="subject-line">
            Subject Property: —
          </p>
        </div>
        <div class="header-right">
          <span class="badge-uad">UAD COMPLIANT</span>
        </div>
      </header>

      <div
        id="grid-empty-state"
        class="hidden"
        role="status"
        aria-live="polite"
      ></div>

      <div
        id="grid-table-wrapper"
        class="table-container table-scroll"
      >
        <table class="data-table">
          <thead>
            <tr id="grid-head-row"></tr>
          </thead>
          <tbody id="grid-content"></tbody>
        </table>
      </div>
    </div>

    <script src="comp-grid.js"></script>
  </body>
</html>
